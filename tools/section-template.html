<!DOCTYPE html>
<!--
  This file is a TEMPLATE — never opened in a browser directly.
  spine/build-content.js reads it, fills in the {{...}} placeholders for
  each of the 19 units (tailbone, 17 chapters, atlas), and emits
  spine/section-0.html ... spine/section-18.html.

  Edit this file to change the layout / chrome of every unit page at once.
  Edit the markdown manuscript in spine/*.md to change the content.

  Placeholders:
    {{page_title}}    — document title, e.g. "#4 — theLastInterface"
    {{tag}}           — short identifier in the breadcrumb, e.g. "#4"
    {{title}}         — unit title (h1)
    {{vertebra}}      — the italic load-bearing sentence
    {{spine_html}}    — the spine prose, already wrapped in <p>...</p>
    {{skeleton_html}} — same for the skeleton
    {{prev_html}}     — prev-link anchor, or empty span if first unit
    {{next_html}}     — next-link anchor, or empty span if last unit
    {{n}}             — the unit's integer index (0..18), used by the
                        inline script to look up the unit at click time
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15140f" media="(prefers-color-scheme: dark)">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>{{page_title}}</title>
<meta name="description" content="A book (in progress) on what humans are — and what the coming era's interface must do to honor them.">
<link rel="canonical" href="{{canonical_url}}">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<meta property="og:type" content="article">
<meta property="og:site_name" content="theLastInterface">
<meta property="og:locale" content="en_US">
<meta property="og:title" content="{{og_title}}">
<meta property="og:description" content="A book (in progress) on what humans are — and what the coming era's interface must do to honor them.">
<meta property="og:url" content="{{canonical_url}}">
<meta property="og:image" content="https://tamimat.github.io/theLastInterFace/assets/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="theLastInterface — a faint eye on cream paper">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{og_title}}">
<meta name="twitter:description" content="A book (in progress) on what humans are — and what the coming era's interface must do to honor them.">
<meta name="twitter:image" content="https://tamimat.github.io/theLastInterFace/assets/og.png">
<script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('theme-dark');}catch(e){}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=BUILT">
</head>
<body>
<div class="wrap">

  <div class="page-top">
    <a class="page-close" href="index.html" aria-label="back to spine">
      <svg class="icon-x" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.75827 17.2426L12.0009 12M17.2435 6.75736L12.0009 12M12.0009 12L6.75827 6.75736M12.0009 12L17.2435 17.2426"/></svg>
      <svg class="icon-circle" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/></svg>
    </a>
  </div>

  <header class="spine-header">
    <h1><span class="unit-tag">{{tag}}</span> {{title}}</h1>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra">{{vertebra}}</p>

  <div class="label">Spine</div>
  <div class="section-spine">
      {{spine_html}}
  </div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton">
      {{skeleton_html}}
  </div>

  <div class="actions">
    <button class="copy" id="copy-focus">
      <span class="main">Copy this spine</span>
      <span class="hint">focus work</span>
    </button>
  </div>

  <div class="nav">{{prev_html}}{{next_html}}</div>

  <div class="page-bottom">
    <a class="page-close" href="index.html" aria-label="back to spine">
      <svg class="icon-x" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6.75827 17.2426L12.0009 12M17.2435 6.75736L12.0009 12M12.0009 12L6.75827 6.75736M12.0009 12L17.2435 17.2426"/></svg>
      <svg class="icon-circle" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"/></svg>
    </a>
  </div>

</div>

<script src="build.js?v=BUILT"></script>
<script src="content.js?v=BUILT"></script>
<script src="render.js?v=BUILT"></script>
<script>
(function() {
  const S = window.SPINE;
  const R = window.SPINE_RENDER;
  // Unit number is baked in at build time so the page knows which unit it is
  // without parsing the URL. content.js still provides the cross-unit data
  // the Copy buttons need (for "This + others as spines").
  const unit = S.allUnits().find(u => u.n === {{n}});
  document.getElementById('copy-focus').addEventListener('click', function() {
    R.copyText(R.buildFocus(S, unit), this);
  });
}());
</script>
</body>
</html>
