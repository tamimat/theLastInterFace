<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Atlas — theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile7">
</head>
<body>
<div class="wrap">

  <a href="index.html" class="back-link">← back to spine</a>

  <header class="spine-header">
    <h1 id="atlas-heading">Atlas</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra" id="vertebra"></p>

  <div class="label">Spine</div>
  <div class="section-spine" id="spine"></div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton" id="skeleton"></div>

  <div class="actions">
    <div class="action-row">
      <button class="copy" id="copy-atlas">
        <span class="main">Copy the atlas</span>
        <span class="hint">vertebra + spine + skeleton</span>
      </button>
      <button class="copy" id="copy-atlas-with-spines">
        <span class="main">Copy atlas + all spines</span>
        <span class="hint">+ every chapter's spine</span>
      </button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;
  const A = S.atlas;

  // Header
  document.title = 'Atlas — ' + S.meta.title;
  document.getElementById('atlas-heading').textContent = 'Atlas';

  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Vertebra
  document.getElementById('vertebra').textContent = A.vertebra;

  // Spine — paragraphs split on blank lines
  const spineEl = document.getElementById('spine');
  spineEl.innerHTML = '';
  A.spine.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    spineEl.appendChild(p);
  });

  // Skeleton — paragraphs split on blank lines
  const skelEl = document.getElementById('skeleton');
  skelEl.innerHTML = '';
  A.skeleton.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    skelEl.appendChild(p);
  });

  // Backward nav — atlas is the last vertebra; previous is the final chapter
  const navEl = document.getElementById('nav');
  const prev = S.spine[S.spine.length - 1];
  navEl.innerHTML =
    (prev ? '<a href="section.html?n=' + prev.n + '">← ' + prev.n + '. ' + prev.title + '</a>' : '<span></span>')
    + '<span></span>';

  // Copy
  function header() {
    return 'SPINE — ' + S.meta.title
      + ' — last updated ' + S.meta.lastUpdated
      + ' — focus: atlas';
  }

  function buildAtlasContext() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('ATLAS');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(A.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(A.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(A.skeleton);
    return lines.join('\n');
  }

  // Cross-chapter context: full atlas + every chapter's spine. Read from
  // window.SPINE at click time so it's always current.
  function buildAtlasWithAllSpines() {
    const out = [];
    out.push('# Atlas — full');
    out.push('');
    out.push('## Vertebra');
    out.push('');
    out.push(A.vertebra);
    out.push('');
    out.push('## Spine');
    out.push('');
    out.push(A.spine);
    out.push('');
    out.push('## Skeleton');
    out.push('');
    out.push(A.skeleton);
    out.push('');
    out.push('---');
    out.push('');
    out.push('# Spines of chapters (for cross-reference context)');
    out.push('');
    S.spine.forEach(chap => {
      out.push('## Chapter ' + chap.n + '. ' + chap.title + ' — spine');
      out.push('');
      out.push(chap.spine);
      out.push('');
    });
    return out.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.innerHTML;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-atlas').addEventListener('click', function() {
    copyText(buildAtlasContext(), this);
  });
  document.getElementById('copy-atlas-with-spines').addEventListener('click', function() {
    copyText(buildAtlasWithAllSpines(), this);
  });
})();
</script>
</body>
</html>
