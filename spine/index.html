<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile5">
</head>
<body>
<div class="wrap">

  <header class="spine-header">
    <h1 id="title">Spine</h1>
    <div class="meta" id="meta"></div>
  </header>

  <details class="membrane-wrap" id="membrane-wrap">
    <summary class="membrane-toggle">Membrane</summary>
    <dl class="membrane" id="membrane"></dl>
  </details>

  <div class="label">Thesis</div>
  <p class="thesis" id="thesis"></p>

  <div class="label">Spine</div>
  <ol class="sections-list" id="spine-list"></ol>

  <div class="actions">
    <div class="action-row">
      <button class="copy" id="download-read">
        <span class="main">Download read.md</span>
        <span class="hint">for a human reading</span>
      </button>
      <button class="copy compact" id="copy-read">Copy</button>
    </div>
    <div class="action-row">
      <button class="copy" id="download-llm">
        <span class="main">Download llm.md</span>
        <span class="hint">for an AI chat</span>
      </button>
      <button class="copy compact" id="copy-llm">Copy</button>
    </div>
  </div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;

  // Header
  document.getElementById('title').textContent = S.meta.title;
  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Membrane — collapsed by default; populate the <dl> inside the <details>.
  // Hide the whole block if no membrane rules are defined so the page stays clean.
  const memEl = document.getElementById('membrane');
  if (S.membrane && S.membrane.length) {
    S.membrane.forEach(c => {
      const dt = document.createElement('dt');
      dt.textContent = c.title;
      const dd = document.createElement('dd');
      dd.textContent = c.body;
      memEl.appendChild(dt);
      memEl.appendChild(dd);
    });
  } else {
    document.getElementById('membrane-wrap').style.display = 'none';
  }

  // Body
  document.getElementById('thesis').textContent = S.thesis;

  // Spine — the full chain of bones: tailbone, the 17 chapters, atlas.
  // All three kinds of unit belong to the same spine and live in the same list.
  // The tailbone and atlas use a `summary` field for the index line; chapters use their vertebra.
  const list = document.getElementById('spine-list');

  // Tailbone is 0, chapters are 1..17, atlas is 18 — all on the same hierarchical level.
  // The tailbone and atlas have their own pages (not section.html) but otherwise render
  // identically to chapters in the list.
  const items = [
    {
      n: 0,
      href: 'tailbone.html',
      title: 'Tailbone',
      line: S.tailbone.summary || S.tailbone.vertebra
    },
    ...S.spine.map(sec => ({
      n: sec.n,
      href: 'section.html?n=' + sec.n,
      title: sec.title,
      line: sec.vertebra
    })),
    {
      n: 18,
      href: 'atlas.html',
      title: 'Atlas',
      line: S.atlas.summary || S.atlas.vertebra
    }
  ];

  items.forEach(item => {
    const li = document.createElement('li');
    const num = document.createElement('span');
    num.className = 'section-num';
    num.textContent = item.n + '.';
    li.appendChild(num);
    const link = document.createElement('a');
    link.href = item.href;
    link.textContent = item.title;
    li.appendChild(link);
    const lineEl = document.createElement('span');
    lineEl.className = 'section-vertebra-line';
    lineEl.textContent = item.line;
    li.appendChild(lineEl);
    list.appendChild(li);
  });

  // Markdown builders — two audiences, two formats.
  //
  // read.md is what a human reading the draft gets: no skeleton, no membrane,
  // no thesis section, no orientation paragraph. Chapter vertebras render as
  // bare italic epigraphs under each title (position implies the role — no
  // "Vertebra:" label). Tailbone and Atlas open straight with their spine
  // prose; their vertebras would be redundant with the spine's opening line.
  function buildReadMarkdown() {
    const out = [];
    out.push('# ' + S.meta.title);
    out.push('');
    out.push('*Draft — last updated ' + S.meta.lastUpdated + '*');
    out.push('');
    out.push('---');
    out.push('');
    out.push('## Tailbone');
    out.push('');
    out.push(S.tailbone.spine);
    out.push('');
    S.spine.forEach(sec => {
      out.push('---');
      out.push('');
      out.push('## Chapter ' + sec.n + '. ' + sec.title);
      out.push('');
      out.push('*' + sec.vertebra + '*');
      out.push('');
      out.push(sec.spine);
      out.push('');
    });
    out.push('---');
    out.push('');
    out.push('## Atlas');
    out.push('');
    out.push(S.atlas.spine);
    out.push('');
    return out.join('\n');
  }

  // llm.md is what an AI chat gets loaded with as context: orientation
  // paragraph, membrane, thesis, and every unit's vertebra/spine/skeleton —
  // the complete working material for reasoning about or writing the book.
  function buildLlmMarkdown() {
    const out = [];
    out.push('# ' + S.meta.title);
    out.push('');
    out.push('**Last updated:** [' + S.meta.lastUpdated + '](' + S.sourceUrl() + ')');
    out.push('');
    out.push('The book has a thesis, a tailbone, a spine, and an atlas. The spine is a chain of chapters, each one a vertebra. The tailbone and the atlas frame the spine from each end — opening and closing units. Every vertebra (tailbone and atlas included) has its own internal structure: a load-bearing line (its own vertebra), the dense prose that holds it in place (its spine), and the surrounding tissue (its skeleton). The boundary rule between spine and skeleton: a paragraph belongs in the skeleton only if a chat seeded with everything except that paragraph would still write the right unit.');
    out.push('');
    if (S.membrane && S.membrane.length) {
      out.push('---');
      out.push('');
      out.push('## Membrane');
      out.push('');
      out.push('The working layer between author and AI. Selectively permeable — lets some language through, refuses others, holds the terms that drift in drafting. Read these before the content; they prime everything that follows.');
      out.push('');
      S.membrane.forEach(c => {
        out.push('### ' + c.title);
        out.push('');
        out.push(c.body);
        out.push('');
      });
    }
    out.push('---');
    out.push('');
    out.push('## Thesis');
    out.push('');
    out.push(S.thesis);
    out.push('');
    out.push('---');
    out.push('');
    out.push('## Tailbone');
    out.push('');
    out.push('### Vertebra');
    out.push('');
    out.push(S.tailbone.vertebra);
    out.push('');
    out.push('### Spine');
    out.push('');
    out.push(S.tailbone.spine);
    out.push('');
    out.push('### Skeleton');
    out.push('');
    out.push(S.tailbone.skeleton);
    out.push('');
    S.spine.forEach(sec => {
      out.push('---');
      out.push('');
      out.push('## Chapter ' + sec.n + '. ' + sec.title);
      out.push('');
      out.push('### Vertebra');
      out.push('');
      out.push(sec.vertebra);
      out.push('');
      out.push('### Spine');
      out.push('');
      out.push(sec.spine);
      out.push('');
      out.push('### Skeleton');
      out.push('');
      out.push(sec.skeleton);
      out.push('');
    });
    out.push('---');
    out.push('');
    out.push('## Atlas');
    out.push('');
    out.push('### Vertebra');
    out.push('');
    out.push(S.atlas.vertebra);
    out.push('');
    out.push('### Spine');
    out.push('');
    out.push(S.atlas.spine);
    out.push('');
    out.push('### Skeleton');
    out.push('');
    out.push(S.atlas.skeleton);
    out.push('');
    return out.join('\n');
  }

  function downloadMd(filename, content, btn) {
    const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    // Save innerHTML (not textContent) so multi-line button structure survives
    // the flash + restore.
    const original = btn.innerHTML;
    btn.textContent = 'Downloaded ' + filename;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = original;
      btn.classList.remove('copied');
    }, 1600);
  }

  // Filename suffix carries the git build number so each download lands as a
  // distinct file (no auto-replace in the Downloads folder). Falls back to a
  // plain name if SPINE_BUILD isn't loaded — happens only on a clone that
  // hasn't run tools/gen-build-js.sh yet.
  function downloadName(base) {
    const b = window.SPINE_BUILD;
    return (b && typeof b.count === 'number')
      ? base + '-g' + b.count + '.md'
      : base + '.md';
  }

  function copyText(content, btn) {
    navigator.clipboard.writeText(content).then(() => {
      const original = btn.innerHTML;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1600);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('download-read').addEventListener('click', function() {
    downloadMd(downloadName('read'), buildReadMarkdown(), this);
  });
  document.getElementById('download-llm').addEventListener('click', function() {
    downloadMd(downloadName('llm'), buildLlmMarkdown(), this);
  });
  document.getElementById('copy-read').addEventListener('click', function() {
    copyText(buildReadMarkdown(), this);
  });
  document.getElementById('copy-llm').addEventListener('click', function() {
    copyText(buildLlmMarkdown(), this);
  });
})();
</script>
</body>
</html>
