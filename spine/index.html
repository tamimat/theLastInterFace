<script>
(function() {
  const S = window.SPINE;
  const R = window.SPINE_RENDER;

  // Header
  document.getElementById('title').textContent = S.meta.title;

  // WIP badge — doubles as the version trail. buildLabelHtml emits a link
  // to the current commit (git #N) when the deploy step has written
  // build.js, or falls back to a "last updated <date>" link.
  document.getElementById('work-in-progress').innerHTML =
    (S.buildLabelHtml || S.lastUpdatedLinkHtml)() + ' — work in progress';

  // Membrane — collapsed by default; populate the <dl> inside the <details>.
  // Hide the whole block if no membrane rules are defined so the page stays clean.
  const memEl = document.getElementById('membrane');
  if (S.membrane && S.membrane.length) {
    S.membrane.forEach(c => {
      const dt = document.createElement('dt');
      dt.textContent = c.title;
      const dd = document.createElement('dd');
      dd.textContent = c.body;
      memEl.appendChild(dt);
      memEl.appendChild(dd);
    });
  } else {
    document.getElementById('membrane-wrap').style.display = 'none';
  }

  // Body
  document.getElementById('notochord').textContent = S.notochord;

  // Spine — tailbone (n=0), chapters (n=1..17), atlas (n=18) — all listed
  // through one iteration. The tailbone and atlas use a `summary` field
  // for the index line; chapters fall back to their vertebra.
  const list = document.getElementById('spine-list');
  S.allUnits().forEach(u => {
    const li = document.createElement('li');
    const num = document.createElement('span');
    num.className = 'section-num';
    num.textContent = '#' + u.n;
    li.appendChild(num);
    const link = document.createElement('a');
    link.href = 'section-' + u.n + '.html';
    link.textContent = u.title;
    li.appendChild(link);
    const lineEl = document.createElement('span');
    lineEl.className = 'section-vertebra-line';
    lineEl.textContent = u.summary || u.vertebra;
    li.appendChild(lineEl);
    list.appendChild(li);
  });

  // Single primary action: copy the llm.md format to the clipboard, ready to
  // paste into a chat. R.buildReadMarkdown is also available (human-reading
  // format) for any future static-file or direct-URL generation step.
  document.getElementById('copy-book').addEventListener('click', function() {
    R.copyText(R.buildLlmMarkdown(S), this);
  });
}());
</script>
