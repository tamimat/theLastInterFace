<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile2">
</head>
<body>
<div class="wrap">

  <header class="spine-header">
    <h1 id="title">Spine</h1>
    <div class="meta" id="meta"></div>
  </header>

  <details class="membrane-wrap" id="membrane-wrap">
    <summary class="membrane-toggle">Membrane</summary>
    <dl class="membrane" id="membrane"></dl>
  </details>

  <div class="label">Thesis</div>
  <p class="thesis" id="thesis"></p>

  <div class="label">Spine</div>
  <ol class="sections-list" id="spine-list"></ol>

  <div class="actions">
    <button class="copy" id="copy-spine">Copy spine</button>
    <button class="copy" id="copy-full">Copy spine + skeleton</button>
    <button class="copy" id="download-md">Download spine.md (for claude.ai project knowledge)</button>
  </div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;

  // Header
  document.getElementById('title').textContent = S.meta.title;
  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Membrane — collapsed by default; populate the <dl> inside the <details>.
  // Hide the whole block if no membrane rules are defined so the page stays clean.
  const memEl = document.getElementById('membrane');
  if (S.membrane && S.membrane.length) {
    S.membrane.forEach(c => {
      const dt = document.createElement('dt');
      dt.textContent = c.title;
      const dd = document.createElement('dd');
      dd.textContent = c.body;
      memEl.appendChild(dt);
      memEl.appendChild(dd);
    });
  } else {
    document.getElementById('membrane-wrap').style.display = 'none';
  }

  // Body
  document.getElementById('thesis').textContent = S.thesis;

  // Spine — the full chain of bones: tailbone, the 17 chapters, atlas.
  // All three kinds of unit belong to the same spine and live in the same list.
  // The tailbone and atlas use a `summary` field for the index line; chapters use their vertebra.
  const list = document.getElementById('spine-list');

  // Tailbone is 0, chapters are 1..17, atlas is 18 — all on the same hierarchical level.
  // The tailbone and atlas have their own pages (not section.html) but otherwise render
  // identically to chapters in the list.
  const items = [
    {
      n: 0,
      href: 'tailbone.html',
      title: 'Tailbone',
      line: S.tailbone.summary || S.tailbone.vertebra
    },
    ...S.spine.map(sec => ({
      n: sec.n,
      href: 'section.html?n=' + sec.n,
      title: sec.title,
      line: sec.vertebra
    })),
    {
      n: 18,
      href: 'atlas.html',
      title: 'Atlas',
      line: S.atlas.summary || S.atlas.vertebra
    }
  ];

  items.forEach(item => {
    const li = document.createElement('li');
    const num = document.createElement('span');
    num.className = 'section-num';
    num.textContent = item.n + '.';
    li.appendChild(num);
    const link = document.createElement('a');
    link.href = item.href;
    link.textContent = item.title;
    li.appendChild(link);
    const lineEl = document.createElement('span');
    lineEl.className = 'section-vertebra-line';
    lineEl.textContent = item.line;
    li.appendChild(lineEl);
    list.appendChild(li);
  });

  // Copy helpers
  function header() {
    return 'SPINE — ' + S.meta.title
      + ' — last updated ' + S.meta.lastUpdated;
  }

  function buildSpineOnly() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('TAILBONE');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(S.tailbone.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(S.tailbone.spine);
    lines.push('');
    S.spine.forEach(sec => {
      lines.push('CHAPTER ' + sec.n + ': ' + sec.title);
      lines.push('');
      lines.push('VERTEBRA');
      lines.push(sec.vertebra);
      lines.push('');
      lines.push('SPINE');
      lines.push(sec.spine);
      lines.push('');
    });
    lines.push('ATLAS');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(S.atlas.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(S.atlas.spine);
    return lines.join('\n');
  }

  function buildFull() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('TAILBONE');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(S.tailbone.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(S.tailbone.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(S.tailbone.skeleton);
    lines.push('');
    S.spine.forEach(sec => {
      lines.push('CHAPTER ' + sec.n + ': ' + sec.title);
      lines.push('');
      lines.push('VERTEBRA');
      lines.push(sec.vertebra);
      lines.push('');
      lines.push('SPINE');
      lines.push(sec.spine);
      lines.push('');
      lines.push('SKELETON');
      lines.push(sec.skeleton);
      lines.push('');
    });
    lines.push('ATLAS');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(S.atlas.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(S.atlas.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(S.atlas.skeleton);
    return lines.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-spine').addEventListener('click', function() {
    copyText(buildSpineOnly(), this);
  });
  document.getElementById('copy-full').addEventListener('click', function() {
    copyText(buildFull(), this);
  });

  // Markdown export for claude.ai project knowledge
  function buildMarkdown() {
    const out = [];
    out.push('# ' + S.meta.title);
    out.push('');
    out.push('**Last updated:** [' + S.meta.lastUpdated + '](' + S.sourceUrl() + ')');
    out.push('');
    out.push('The book has a thesis, a tailbone, a spine, and an atlas. The spine is a chain of chapters, each one a vertebra. The tailbone and the atlas frame the spine from each end — opening and closing units. Every vertebra (tailbone and atlas included) has its own internal structure: a load-bearing line (its own vertebra), the dense prose that holds it in place (its spine), and the surrounding tissue (its skeleton). The boundary rule between spine and skeleton: a paragraph belongs in the skeleton only if a chat seeded with everything except that paragraph would still write the right unit.');
    out.push('');
    if (S.membrane && S.membrane.length) {
      out.push('---');
      out.push('');
      out.push('## Membrane');
      out.push('');
      out.push('The working layer between author and AI. Selectively permeable — lets some language through, refuses others, holds the terms that drift in drafting. Read these before the content; they prime everything that follows.');
      out.push('');
      S.membrane.forEach(c => {
        out.push('### ' + c.title);
        out.push('');
        out.push(c.body);
        out.push('');
      });
    }
    out.push('---');
    out.push('');
    out.push('## Thesis');
    out.push('');
    out.push(S.thesis);
    out.push('');
    out.push('---');
    out.push('');
    out.push('## Tailbone');
    out.push('');
    out.push('### Vertebra');
    out.push('');
    out.push(S.tailbone.vertebra);
    out.push('');
    out.push('### Spine');
    out.push('');
    out.push(S.tailbone.spine);
    out.push('');
    out.push('### Skeleton');
    out.push('');
    out.push(S.tailbone.skeleton);
    out.push('');
    S.spine.forEach(sec => {
      out.push('---');
      out.push('');
      out.push('## Chapter ' + sec.n + '. ' + sec.title);
      out.push('');
      out.push('### Vertebra');
      out.push('');
      out.push(sec.vertebra);
      out.push('');
      out.push('### Spine');
      out.push('');
      out.push(sec.spine);
      out.push('');
      out.push('### Skeleton');
      out.push('');
      out.push(sec.skeleton);
      out.push('');
    });
    out.push('---');
    out.push('');
    out.push('## Atlas');
    out.push('');
    out.push('### Vertebra');
    out.push('');
    out.push(S.atlas.vertebra);
    out.push('');
    out.push('### Spine');
    out.push('');
    out.push(S.atlas.spine);
    out.push('');
    out.push('### Skeleton');
    out.push('');
    out.push(S.atlas.skeleton);
    out.push('');
    return out.join('\n');
  }

  document.getElementById('download-md').addEventListener('click', function() {
    const md = buildMarkdown();
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'spine.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    const original = this.textContent;
    this.textContent = 'Downloaded spine.md';
    this.classList.add('copied');
    setTimeout(() => {
      this.textContent = original;
      this.classList.remove('copied');
    }, 1600);
  });
})();
</script>
</body>
</html>
