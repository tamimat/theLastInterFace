<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Spine — The Last Interface</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="wrap">

  <header class="spine-header">
    <h1 id="title">Spine</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="label">Opening</div>
  <p class="opening" id="opening"></p>

  <div class="label">Thesis</div>
  <p class="thesis" id="thesis"></p>

  <div class="label">Sections</div>
  <ol class="sections-list" id="sections"></ol>

  <div class="label">Ending</div>
  <p class="ending" id="ending"></p>

  <div class="actions">
    <button class="copy" id="copy-spine">Copy spine</button>
    <button class="copy" id="copy-full">Copy spine + skeleton</button>
    <button class="copy" id="download-md">Download spine.md (for claude.ai project knowledge)</button>
  </div>

</div>

<script src="content.js"></script>
<script>
(function() {
  const S = window.SPINE;

  // Header
  document.getElementById('title').textContent = S.meta.title + ' — Spine';
  const metaEl = document.getElementById('meta');
  const statusClass = S.meta.status === 'locked' ? 'status-locked' : 'status-working';
  const lockBit = S.meta.status === 'locked' && S.meta.lockedDate
    ? ' — locked ' + S.meta.lockedDate
    : '';
  metaEl.innerHTML = 'v' + S.meta.version
    + ' <span class="' + statusClass + '">' + S.meta.status + '</span>'
    + lockBit;

  // Body
  document.getElementById('opening').textContent = S.opening;
  document.getElementById('thesis').textContent = S.thesis;
  document.getElementById('ending').textContent = S.ending;

  // Sections list — title is a blue link to section page, spine line below
  const list = document.getElementById('sections');
  S.sections.forEach(sec => {
    const li = document.createElement('li');
    const link = document.createElement('a');
    link.href = 'section.html?n=' + sec.n;
    link.textContent = sec.title;
    li.innerHTML = '<span class="section-num">' + sec.n + '.</span>';
    li.appendChild(link);
    const teaserLine = document.createElement('span');
    teaserLine.className = 'section-spine-line';
    teaserLine.textContent = sec.teaser;
    li.appendChild(teaserLine);
    list.appendChild(li);
  });

  // Copy helpers
  function header() {
    const dateStr = S.meta.status === 'locked' && S.meta.lockedDate
      ? S.meta.lockedDate
      : new Date().toISOString().slice(0, 10);
    return 'SPINE — ' + S.meta.title
      + ' — v' + S.meta.version
      + ' (' + S.meta.status + ')'
      + ' — ' + dateStr;
  }

  function buildSpineOnly() {
    const lines = [header(), ''];
    lines.push('OPENING');
    lines.push(S.opening);
    lines.push('');
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    S.sections.forEach(sec => {
      lines.push('SECTION ' + sec.n + ': ' + sec.title);
      lines.push(sec.spine);
      lines.push('');
    });
    lines.push('ENDING');
    lines.push(S.ending);
    return lines.join('\n');
  }

  function buildFull() {
    const lines = [header(), ''];
    lines.push('OPENING');
    lines.push(S.opening);
    lines.push('');
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    S.sections.forEach(sec => {
      lines.push('SECTION ' + sec.n + ': ' + sec.title);
      lines.push('');
      lines.push('SPINE');
      lines.push(sec.spine);
      lines.push('');
      lines.push('SKELETON');
      lines.push(sec.skeleton);
      lines.push('');
    });
    lines.push('ENDING');
    lines.push(S.ending);
    return lines.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-spine').addEventListener('click', function() {
    copyText(buildSpineOnly(), this);
  });
  document.getElementById('copy-full').addEventListener('click', function() {
    copyText(buildFull(), this);
  });

  // Markdown export for claude.ai project knowledge
  function buildMarkdown() {
    const dateStr = S.meta.status === 'locked' && S.meta.lockedDate
      ? S.meta.lockedDate
      : new Date().toISOString().slice(0, 10);
    const out = [];
    out.push('# ' + S.meta.title + ' — Spine');
    out.push('');
    out.push('**Version:** ' + S.meta.version + ' — ' + S.meta.status + ' — ' + dateStr);
    out.push('');
    out.push('This document is the curated, blessed context for the book. It is split into the *spine* (load-bearing argument — what a fresh chat must know to write or reason about a section correctly) and the *skeleton* (supporting material). The boundary rule: a paragraph belongs in the skeleton only if a chat seeded with everything except that paragraph would still write the right section.');
    out.push('');
    out.push('---');
    out.push('');
    out.push('## Opening');
    out.push('');
    out.push(S.opening);
    out.push('');
    out.push('## Thesis');
    out.push('');
    out.push(S.thesis);
    out.push('');
    S.sections.forEach(sec => {
      out.push('---');
      out.push('');
      out.push('## Section ' + sec.n + '. ' + sec.title);
      out.push('');
      out.push('### Spine');
      out.push('');
      out.push(sec.spine);
      out.push('');
      out.push('### Skeleton');
      out.push('');
      out.push(sec.skeleton);
      out.push('');
    });
    out.push('---');
    out.push('');
    out.push('## Ending');
    out.push('');
    out.push(S.ending);
    out.push('');
    return out.join('\n');
  }

  document.getElementById('download-md').addEventListener('click', function() {
    const md = buildMarkdown();
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'spine.md';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    const original = this.textContent;
    this.textContent = 'Downloaded spine.md';
    this.classList.add('copied');
    setTimeout(() => {
      this.textContent = original;
      this.classList.remove('copied');
    }, 1600);
  });
})();
</script>
</body>
</html>
