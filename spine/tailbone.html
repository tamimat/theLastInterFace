<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Tailbone — theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile4">
</head>
<body>
<div class="wrap">

  <a href="index.html" class="back-link">← back to spine</a>

  <header class="spine-header">
    <h1 id="tailbone-heading">Tailbone</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra" id="vertebra"></p>

  <div class="label">Spine</div>
  <div class="section-spine" id="spine"></div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton" id="skeleton"></div>

  <div class="actions">
    <button class="copy" id="copy-tailbone">Copy tailbone (vertebra + spine + skeleton)</button>
  </div>

  <div class="nav" id="nav"></div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;
  const T = S.tailbone;

  // Header
  document.title = 'Tailbone — ' + S.meta.title;
  document.getElementById('tailbone-heading').textContent = 'Tailbone';

  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Vertebra
  document.getElementById('vertebra').textContent = T.vertebra;

  // Spine — paragraphs split on blank lines
  const spineEl = document.getElementById('spine');
  spineEl.innerHTML = '';
  T.spine.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    spineEl.appendChild(p);
  });

  // Skeleton — paragraphs split on blank lines
  const skelEl = document.getElementById('skeleton');
  skelEl.innerHTML = '';
  T.skeleton.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    skelEl.appendChild(p);
  });

  // Forward nav into the chapters
  const navEl = document.getElementById('nav');
  const next = S.spine[0];
  navEl.innerHTML =
    '<span></span>'
    + (next ? '<a href="section.html?n=' + next.n + '">' + next.n + '. ' + next.title + ' →</a>' : '<span></span>');

  // Copy
  function header() {
    return 'SPINE — ' + S.meta.title
      + ' — v' + S.meta.version
      + ' — last updated ' + S.meta.lastUpdated
      + ' — focus: tailbone';
  }

  function buildTailboneContext() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('TAILBONE');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(T.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(T.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(T.skeleton);
    return lines.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.textContent;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-tailbone').addEventListener('click', function() {
    copyText(buildTailboneContext(), this);
  });
})();
</script>
</body>
</html>
