<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Tailbone — theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile7">
</head>
<body>
<div class="wrap">

  <a href="index.html" class="back-link">← back to spine</a>

  <header class="spine-header">
    <h1 id="tailbone-heading">Tailbone</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra" id="vertebra"></p>

  <div class="label">Spine</div>
  <div class="section-spine" id="spine"></div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton" id="skeleton"></div>

  <div class="actions">
    <div class="action-row">
      <button class="copy" id="copy-tailbone">
        <span class="main">Just the tailbone</span>
        <span class="hint">self-contained</span>
      </button>
      <button class="copy" id="copy-tailbone-with-spines">
        <span class="main">Tailbone + every chapter in outline</span>
        <span class="hint">for cross-chapter work</span>
      </button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;
  const T = S.tailbone;

  // Header
  document.title = 'Tailbone — ' + S.meta.title;
  document.getElementById('tailbone-heading').textContent = 'Tailbone';

  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Vertebra
  document.getElementById('vertebra').textContent = T.vertebra;

  // Spine — paragraphs split on blank lines
  const spineEl = document.getElementById('spine');
  spineEl.innerHTML = '';
  T.spine.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    spineEl.appendChild(p);
  });

  // Skeleton — paragraphs split on blank lines
  const skelEl = document.getElementById('skeleton');
  skelEl.innerHTML = '';
  T.skeleton.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    skelEl.appendChild(p);
  });

  // Forward nav into the chapters
  const navEl = document.getElementById('nav');
  const next = S.spine[0];
  navEl.innerHTML =
    '<span></span>'
    + (next ? '<a href="section.html?n=' + next.n + '">' + next.n + '. ' + next.title + ' →</a>' : '<span></span>');

  // Copy
  function header() {
    return 'SPINE — ' + S.meta.title
      + ' — last updated ' + S.meta.lastUpdated
      + ' — focus: tailbone';
  }

  function buildTailboneContext() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('TAILBONE');
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(T.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(T.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(T.skeleton);
    return lines.join('\n');
  }

  // Cross-chapter context: full tailbone + every chapter's spine. Read from
  // window.SPINE at click time so it's always current.
  function buildTailboneWithAllSpines() {
    const out = [];
    out.push('# Tailbone — full');
    out.push('');
    out.push('## Vertebra');
    out.push('');
    out.push(T.vertebra);
    out.push('');
    out.push('## Spine');
    out.push('');
    out.push(T.spine);
    out.push('');
    out.push('## Skeleton');
    out.push('');
    out.push(T.skeleton);
    out.push('');
    out.push('---');
    out.push('');
    out.push('# Spines of chapters (for cross-reference context)');
    out.push('');
    S.spine.forEach(chap => {
      out.push('## Chapter ' + chap.n + '. ' + chap.title + ' — spine');
      out.push('');
      out.push(chap.spine);
      out.push('');
    });
    return out.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const original = btn.innerHTML;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-tailbone').addEventListener('click', function() {
    copyText(buildTailboneContext(), this);
  });
  document.getElementById('copy-tailbone-with-spines').addEventListener('click', function() {
    copyText(buildTailboneWithAllSpines(), this);
  });
})();
</script>
</body>
</html>
