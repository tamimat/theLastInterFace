<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile9">
</head>
<body>
<div class="wrap">

  <div class="page-nav">
    <a href="index.html" class="back-link">← back to spine</a>
    <span class="unit-tag" id="unit-tag"></span>
  </div>

  <header class="spine-header">
    <h1 id="section-heading"></h1>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra" id="vertebra"></p>

  <div class="label">Spine</div>
  <div class="section-spine" id="spine"></div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton" id="skeleton"></div>

  <div class="actions">
    <div class="action-row">
      <button class="copy" id="copy-focus">
        <span class="main" id="copy-focus-main"></span>
        <span class="hint">self-contained</span>
      </button>
      <button class="copy" id="copy-with-spines">
        <span class="main" id="copy-spines-main"></span>
        <span class="hint">for cross-chapter work</span>
      </button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;

  // Parse ?n=N (0 = tailbone, 1..17 = chapters, 18 = atlas).
  const params = new URLSearchParams(window.location.search);
  const n = parseInt(params.get('n'), 10);

  // Resolve any n in [0, 18] to a unit with a uniform shape:
  //   { kind, n, tag, title, vertebra, spine, skeleton }
  // Tailbone and atlas share this shape with chapters so the rest of the page
  // can render and reason without per-kind branching.
  function getUnit(n) {
    if (n === 0) {
      return { kind: 'tailbone', n: 0, tag: 'Tailbone', title: 'Tailbone',
               vertebra: S.tailbone.vertebra, spine: S.tailbone.spine, skeleton: S.tailbone.skeleton };
    }
    if (n === 18) {
      return { kind: 'atlas', n: 18, tag: 'Atlas', title: 'Atlas',
               vertebra: S.atlas.vertebra, spine: S.atlas.spine, skeleton: S.atlas.skeleton };
    }
    const c = S.spine.find(s => s.n === n);
    if (c) return { kind: 'chapter', n: c.n, tag: 'Chapter ' + c.n, title: c.title,
                    vertebra: c.vertebra, spine: c.spine, skeleton: c.skeleton };
    return null;
  }

  const unit = getUnit(n);
  if (!unit) {
    document.querySelector('.wrap').innerHTML =
      '<a href="index.html" class="back-link">← back to spine</a>'
      + '<p>Not found.</p>';
    return;
  }

  // Header — tag in the breadcrumb row (top right), title in the h1 below.
  // For tailbone/atlas the tag and title are the same word; that's fine —
  // the visual structure matches chapters so the page reads consistently.
  document.title = unit.tag + ' — ' + S.meta.title;
  document.getElementById('unit-tag').textContent = unit.tag;
  document.getElementById('section-heading').textContent = unit.title;

  // Body
  document.getElementById('vertebra').textContent = unit.vertebra;

  const spineEl = document.getElementById('spine');
  spineEl.innerHTML = '';
  unit.spine.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    spineEl.appendChild(p);
  });

  const skelEl = document.getElementById('skeleton');
  skelEl.innerHTML = '';
  unit.skeleton.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    skelEl.appendChild(p);
  });

  // Prev/next nav — unit-agnostic now. Prev exists for n>0, next for n<18.
  function navLabel(u) {
    return u.kind === 'chapter' ? u.n + '. ' + u.title : u.tag;
  }
  const prev = n > 0 ? getUnit(n - 1) : null;
  const next = n < 18 ? getUnit(n + 1) : null;
  const navEl = document.getElementById('nav');
  navEl.innerHTML =
      (prev ? '<a href="section.html?n=' + prev.n + '">← ' + navLabel(prev) + '</a>' : '<span></span>')
    + (next ? '<a href="section.html?n=' + next.n + '">' + navLabel(next) + ' →</a>' : '<span></span>');

  // Button labels — same shape for every unit, with the focus name interpolated.
  // 'Chapter N only' for chapters, 'Tailbone only' / 'Atlas only' for framing units.
  document.getElementById('copy-focus-main').textContent = unit.tag + ' only';
  document.getElementById('copy-spines-main').textContent =
    unit.tag + ' in full + ' + (unit.kind === 'chapter' ? 'other chapters' : 'chapters') + ' as spines';

  // Focus-only payload: ALL-CAPS labels (legacy format the previous
  // per-unit copy buttons emitted). Includes thesis + this unit only.
  function buildFocus() {
    const lines = [];
    lines.push('SPINE — ' + S.meta.title
      + ' — last updated ' + S.meta.lastUpdated
      + ' — focus: ' + unit.tag);
    lines.push('');
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push(unit.kind === 'chapter'
      ? 'CHAPTER ' + unit.n + ': ' + unit.title
      : unit.tag.toUpperCase());
    lines.push('');
    lines.push('VERTEBRA'); lines.push(unit.vertebra); lines.push('');
    lines.push('SPINE');    lines.push(unit.spine);    lines.push('');
    lines.push('SKELETON'); lines.push(unit.skeleton);
    return lines.join('\n');
  }

  // Cross-chapter context payload: focus in full + every chapter spine.
  // Reads from window.SPINE at click time so it's always current.
  // If focus is a chapter, its own spine stays inside the full block and is
  // never duplicated in the spines section. Tailbone and atlas are framing
  // units (not chapters), so the spines section always covers all 17 chapters.
  function buildWithAllSpines() {
    const out = [];
    const focusHeading = unit.kind === 'chapter'
      ? 'Chapter ' + unit.n + '. ' + unit.title
      : unit.title;
    out.push('# ' + focusHeading + ' — full');
    out.push('');
    out.push('## Vertebra'); out.push(''); out.push(unit.vertebra); out.push('');
    out.push('## Spine');    out.push(''); out.push(unit.spine);    out.push('');
    out.push('## Skeleton'); out.push(''); out.push(unit.skeleton); out.push('');
    out.push('---'); out.push('');
    out.push('# Spines of chapters (for cross-reference context)');
    out.push('');
    S.spine.forEach(c => {
      if (unit.kind === 'chapter' && c.n === unit.n) return;
      out.push('## Chapter ' + c.n + '. ' + c.title + ' — spine');
      out.push('');
      out.push(c.spine);
      out.push('');
    });
    return out.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      // innerHTML save/restore so the multi-line button label survives.
      const original = btn.innerHTML;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-focus').addEventListener('click', function() {
    copyText(buildFocus(), this);
  });
  document.getElementById('copy-with-spines').addEventListener('click', function() {
    copyText(buildWithAllSpines(), this);
  });
})();
</script>
</body>
</html>
