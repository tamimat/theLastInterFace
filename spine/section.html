<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#fafaf7">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="referrer" content="no-referrer">
<title>Chapter — theLastInterface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="styles.css?v=mobile7">
</head>
<body>
<div class="wrap">

  <a href="index.html" class="back-link">← back to spine</a>

  <header class="spine-header">
    <h1 id="section-heading">Section</h1>
    <div class="meta" id="meta"></div>
  </header>

  <div class="label">Vertebra</div>
  <p class="section-vertebra" id="vertebra"></p>

  <div class="label">Spine</div>
  <div class="section-spine" id="spine"></div>

  <div class="label">Skeleton</div>
  <div class="section-skeleton" id="skeleton"></div>

  <div class="actions">
    <div class="action-row">
      <button class="copy" id="copy-section">
        <span class="main">Just this chapter</span>
        <span class="hint">self-contained</span>
      </button>
      <button class="copy" id="copy-with-spines">
        <span class="main">This chapter + every other in outline</span>
        <span class="hint">for cross-chapter work</span>
      </button>
    </div>
  </div>

  <div class="nav" id="nav"></div>

</div>

<script src="build.js?v=mobile2"></script>
<script src="content.js?v=mobile2"></script>
<script>
(function() {
  const S = window.SPINE;

  // Parse ?n=N
  const params = new URLSearchParams(window.location.search);
  const n = parseInt(params.get('n'), 10);
  const sec = S.spine.find(s => s.n === n);

  if (!sec) {
    document.querySelector('.wrap').innerHTML =
      '<a href="index.html" class="back-link">← back to spine</a>'
      + '<p>Section not found.</p>';
    return;
  }

  // Header
  document.title = 'Chapter ' + sec.n + ' — ' + S.meta.title;
  document.getElementById('section-heading').innerHTML =
    '<span class="unit-prefix">Chapter ' + sec.n + '.</span> ' + sec.title;

  const metaEl = document.getElementById('meta');
  metaEl.innerHTML = (S.buildLabelHtml || S.lastUpdatedLinkHtml)();

  // Vertebra — the single load-bearing line
  document.getElementById('vertebra').textContent = sec.vertebra;

  // Body — render spine as paragraphs (split on blank lines)
  const spineEl = document.getElementById('spine');
  spineEl.innerHTML = '';
  sec.spine.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    spineEl.appendChild(p);
  });

  // Skeleton — also as paragraphs
  const skelEl = document.getElementById('skeleton');
  skelEl.innerHTML = '';
  sec.skeleton.split(/\n\n+/).forEach(para => {
    const p = document.createElement('p');
    p.textContent = para;
    skelEl.appendChild(p);
  });

  // Prev/next nav — chapter 1's prev is the tailbone; the last chapter's next is the atlas
  const navEl = document.getElementById('nav');
  const prev = S.spine.find(s => s.n === sec.n - 1);
  const next = S.spine.find(s => s.n === sec.n + 1);
  const isLast = sec.n === S.spine[S.spine.length - 1].n;
  const prevHtml = prev
    ? '<a href="section.html?n=' + prev.n + '">← ' + prev.n + '. ' + prev.title + '</a>'
    : (sec.n === 1 ? '<a href="tailbone.html">← Tailbone</a>' : '<span></span>');
  const nextHtml = next
    ? '<a href="section.html?n=' + next.n + '">' + next.n + '. ' + next.title + ' →</a>'
    : (isLast ? '<a href="atlas.html">Atlas →</a>' : '<span></span>');
  navEl.innerHTML = prevHtml + nextHtml;

  // Copy: thesis (for orientation) + this section's spine + skeleton
  function header() {
    return 'SPINE — ' + S.meta.title
      + ' — last updated ' + S.meta.lastUpdated
      + ' — focus: chapter ' + sec.n;
  }

  function buildSectionContext() {
    const lines = [header(), ''];
    lines.push('THESIS');
    lines.push(S.thesis);
    lines.push('');
    lines.push('SECTION ' + sec.n + ': ' + sec.title);
    lines.push('');
    lines.push('VERTEBRA');
    lines.push(sec.vertebra);
    lines.push('');
    lines.push('SPINE');
    lines.push(sec.spine);
    lines.push('');
    lines.push('SKELETON');
    lines.push(sec.skeleton);
    return lines.join('\n');
  }

  // Cross-chapter context payload: the focus chapter in full + every other
  // chapter's spine (the structural cross-reference layer, without skeletons
  // or full prose). Read at click time from window.SPINE so it's always
  // current. The focus chapter's own spine stays inside the full block —
  // never duplicated in the spines section.
  function buildChapterWithAllSpines() {
    const out = [];
    out.push('# Chapter ' + sec.n + '. ' + sec.title + ' — full chapter');
    out.push('');
    out.push('## Vertebra');
    out.push('');
    out.push(sec.vertebra);
    out.push('');
    out.push('## Spine');
    out.push('');
    out.push(sec.spine);
    out.push('');
    out.push('## Skeleton');
    out.push('');
    out.push(sec.skeleton);
    out.push('');
    out.push('---');
    out.push('');
    out.push('# Spines of other chapters (for cross-reference context)');
    out.push('');
    S.spine.forEach(other => {
      if (other.n === sec.n) return;  // focus chapter's spine is already above
      out.push('## Chapter ' + other.n + '. ' + other.title + ' — spine');
      out.push('');
      out.push(other.spine);
      out.push('');
    });
    return out.join('\n');
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      // Save innerHTML so multi-line button structure survives the flash.
      const original = btn.innerHTML;
      btn.textContent = 'Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.innerHTML = original;
        btn.classList.remove('copied');
      }, 1400);
    }).catch(err => {
      alert('Copy failed: ' + err);
    });
  }

  document.getElementById('copy-section').addEventListener('click', function() {
    copyText(buildSectionContext(), this);
  });
  document.getElementById('copy-with-spines').addEventListener('click', function() {
    copyText(buildChapterWithAllSpines(), this);
  });
})();
</script>
</body>
</html>
