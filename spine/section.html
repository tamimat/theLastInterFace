<!DOCTYPE html>
<!--
  Legacy redirect shim — the old per-unit URL was section.html?n=N. The
  per-unit pages are now pre-rendered at section-N.html. This file exists
  only so externally-shared old links keep working.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<title>theLastInterface</title>
<script>
(function () {
  var n = new URLSearchParams(location.search).get('n');
  var target = /^\d+$/.test(n || '') ? 'section-' + n + '.html' : 'index.html';
  location.replace(target);
}());
</script>
</head>
<body>
<p><a href="index.html">← back to spine</a></p>
</body>
</html>
